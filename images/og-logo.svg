<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A"/>
      <stop offset="100%" style="stop-color:#123B5A"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#123B5A"/>
      <stop offset="50%" style="stop-color:#00B2B3"/>
      <stop offset="100%" style="stop-color:#00D4D5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="420" cy="100" r="80" fill="#00B2B3" opacity="0.1"/>
  <circle cx="80" cy="420" r="60" fill="#00B2B3" opacity="0.08"/>

  <!-- ZS Monogram -->
  <text x="256" y="240" font-family="Arial, sans-serif" font-size="160" font-weight="900" fill="url(#logoGrad)" text-anchor="middle">ZS</text>

  <!-- ZIAS Text -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="56" fill="white" text-anchor="middle" letter-spacing="10" font-weight="700">ZIAS</text>

  <!-- Tagline -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.7">حلول مالية</text>
</svg>